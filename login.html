<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - RealmX</title>


    <!-- Google Font for tech-feel numbers -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/realmx.css">
<link rel="icon" type="image/png" href="assets/images/favicon.png"><link rel="icon" type="image/x-icon" href="assets/images/favicon.ico"></head>
<body style="background:#000; margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color:#fff;">

<div class="login-page-wrapper">
    <div class="login-card">
        <a href="index.html" class="login-logo-link"><span class="logo-text">RealmX</span></a>

        <h2 class="login-title" id="login-title">登录 RealmX 账号</h2>

        <p class="login-error" id="login-error" style="display:none;"></p>

        <form id="login-form">
            <div class="form-field">
                <label for="login-email">邮箱</label>
                <input type="email" id="login-email" required placeholder="请输入邮箱">
            </div>
            <div class="form-field">
                <label for="login-password">密码</label>
                <input type="password" id="login-password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="login-btn" id="login-submit">登录</button>
        </form>

        <form id="register-form" style="display:none;">
            <div class="form-field">
                <label for="reg-username">用户名</label>
                <input type="text" id="reg-username" required placeholder="请输入用户名">
            </div>
            <div class="form-field">
                <label for="reg-email">邮箱</label>
                <input type="email" id="reg-email" required placeholder="请输入邮箱">
            </div>
            <div class="form-field">
                <label for="reg-password">密码</label>
                <input type="password" id="reg-password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="login-btn" id="reg-submit">注册</button>
        </form>

        <p class="login-switch"><span id="switch-text">新用户？</span> <button class="login-switch-btn" id="switch-btn">注册 RealmX 账号</button></p>
    </div>
</div>

<!-- Scripts (login page: no AMD JS, no header/footer) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/nav-loader.js"></script>

<script>
let isLoginMode = true;

document.getElementById('switch-btn').addEventListener('click', () => {
    isLoginMode = !isLoginMode;
    document.getElementById('login-form').style.display = isLoginMode ? 'block' : 'none';
    document.getElementById('register-form').style.display = isLoginMode ? 'none' : 'block';
    document.getElementById('login-title').textContent = isLoginMode ? '登录 RealmX 账号' : '注册 RealmX 账号';
    document.getElementById('switch-text').textContent = isLoginMode ? '新用户？' : '已有账号？';
    document.getElementById('switch-btn').textContent = isLoginMode ? '注册 RealmX 账号' : '登录';
    document.getElementById('login-error').style.display = 'none';
});

function showError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.style.display = 'block';
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-submit');
    btn.disabled = true; btn.textContent = '请稍候...';

    try {
        const sb = getSupabase();
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;

        const { data: { user } } = await sb.auth.getUser();
        if (user) {
            const { data: profile } = await sb.from('profiles').select('role').eq('id', user.id).single();
            window.location.href = profile?.role === 'admin' ? 'admin/index.html' : 'account.html';
        }
    } catch (err) {
        showError(err.message === 'Invalid login credentials' ? '邮箱或密码错误' : err.message);
        btn.disabled = false; btn.textContent = '登录';
    }
});

document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const btn = document.getElementById('reg-submit');

    if (!username) { showError('请输入用户名'); return; }
    btn.disabled = true; btn.textContent = '请稍候...';

    try {
        const sb = getSupabase();
        const { error } = await sb.auth.signUp({
            email, password,
            options: { data: { username } }
        });
        if (error) throw error;
        alert('注册成功！请查收邮箱确认链接，确认后即可登录。');
        document.getElementById('switch-btn').click();
    } catch (err) {
        showError(err.message);
        btn.disabled = false; btn.textContent = '注册';
    }
});
</script>

</body>
</html>
