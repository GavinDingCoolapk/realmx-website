<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - RealmX Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin.css">
<link rel="icon" type="image/png" href="assets/images/favicon.png"><link rel="icon" type="image/x-icon" href="assets/images/favicon.ico"></head>
<body>
    <div class="admin-layout">
        <nav class="admin-sidebar">
            <div class="admin-sidebar-logo">
                <a href="index.html"><img src="../assets/images/logo-black.png" alt="RealmX" style="height:24px;"></a>
                <span>Admin</span>
            </div>
            <div class="admin-nav">
                <a href="index.html" class="admin-nav-item">📊 仪表盘</a>
                <a href="products.html" class="admin-nav-item">📦 产品管理</a>
                <a href="orders.html" class="admin-nav-item active">🛍 订单管理</a>
                <a href="news.html" class="admin-nav-item">📰 新闻管理</a>
            </div>
            <div class="admin-nav-back">
                <a href="../index.html">← 返回官网</a>
            </div>
        </nav>
        <div class="admin-main">
            <div class="admin-header">
                <h1>订单管理</h1>
                <div>
                    <span id="admin-user" style="color:rgba(255,255,255,0.5);font-size:0.85rem;"></span>
                    <button onclick="logout()" style="margin-left:12px;padding:6px 14px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);border-radius:4px;cursor:pointer;font-size:0.8rem;">退出</button>
                </div>
            </div>
            <div class="admin-content">
                <div class="admin-table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>订单号</th>
                                <th>客户</th>
                                <th>电话</th>
                                <th>产品</th>
                                <th>金额</th>
                                <th>状态</th>
                                <th>日期</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table">
                                <tr><td colspan="7" class="admin-loading">加载中...</td></tr>
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-client.js"></script>

    <script>
        async function initAdmin() {
            const result = await requireAdmin();
            if (!result) return;
            const el = document.getElementById('admin-user');
            if (el) el.textContent = result.profile?.username || result.user.email;
            return result;
        }
        async function logout() {
            await getSupabase().auth.signOut();
            window.location.href = '../index.html';
        }

        (async function() {
            const admin = await initAdmin();
            if (!admin) return;
            const sb = getSupabase();
            const statusMap = { pending: '待确认', processing: '处理中', shipped: '已发货', completed: '已完成', cancelled: '已取消' };

            async function loadOrders() {
                const { data } = await sb.from('orders').select('*').order('created_at', { ascending: false });
                const tbody = document.getElementById('orders-table');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="admin-empty">暂无订单数据</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(o => `<tr>
                    <td>#${o.id}</td>
                    <td>${o.contact_name || '-'}</td>
                    <td>${o.contact_phone || '-'}</td>
                    <td>${(o.items || []).map(i => i.name).join(', ')}</td>
                    <td>¥${Number(o.total_price).toLocaleString()}</td>
                    <td><select class="status-select" onchange="updateStatus(${o.id}, this.value)">
                        ${Object.entries(statusMap).map(([k, v]) => `<option value="${k}" ${o.status === k ? 'selected' : ''}>${v}</option>`).join('')}
                    </select></td>
                    <td>${new Date(o.created_at).toLocaleDateString('zh-CN')}</td>
                </tr>`).join('');
            }

            window.updateStatus = async function(id, status) {
                await sb.from('orders').update({ status }).eq('id', id);
            };

            loadOrders();
        })();
    </script>
</body>
</html>
