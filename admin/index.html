<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理仪表盘 - RealmX Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <nav class="admin-sidebar">
            <div class="admin-sidebar-logo">
                <a href="index.html"><img src="../assets/images/logo-black.png" alt="RealmX" style="height:24px;"></a>
                <span>Admin</span>
            </div>
            <div class="admin-nav">
                <a href="index.html" class="admin-nav-item active">📊 仪表盘</a>
                <a href="products.html" class="admin-nav-item">📦 产品管理</a>
                <a href="orders.html" class="admin-nav-item">🛍 订单管理</a>
                <a href="news.html" class="admin-nav-item">📰 新闻管理</a>
            </div>
            <div class="admin-nav-back">
                <a href="../index.html">← 返回官网</a>
            </div>
        </nav>
        <div class="admin-main">
            <div class="admin-header">
                <h1>管理仪表盘</h1>
                <div>
                    <span id="admin-user" style="color:rgba(255,255,255,0.5);font-size:0.85rem;"></span>
                    <button onclick="logout()" style="margin-left:12px;padding:6px 14px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);border-radius:4px;cursor:pointer;font-size:0.8rem;">退出</button>
                </div>
            </div>
            <div class="admin-content">
                <!-- Stat Cards -->
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-card-label">总订单数</div>
                        <div class="stat-card-value" id="stat-orders">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-label">总收入</div>
                        <div class="stat-card-value" id="stat-revenue">¥0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-label">在售产品</div>
                        <div class="stat-card-value" id="stat-products">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-label">用户数量</div>
                        <div class="stat-card-value" id="stat-users">0</div>
                    </div>
                </div>

                <!-- Recent Orders -->
                <h3 style="color:#fff;font-size:1.1rem;font-weight:600;margin-bottom:20px;">最近订单</h3>
                <div class="admin-table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>订单号</th>
                                <th>客户</th>
                                <th>产品</th>
                                <th>金额</th>
                                <th>状态</th>
                                <th>日期</th>
                            </tr>
                        </thead>
                        <tbody id="recent-orders">
                                <tr><td colspan="6" class="admin-loading">加载中...</td></tr>
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-client.js"></script>

    <script>
        async function initAdmin() {
            const result = await requireAdmin();
            if (!result) return;
            const el = document.getElementById('admin-user');
            if (el) el.textContent = result.profile?.username || result.user.email;
            return result;
        }
        async function logout() {
            await getSupabase().auth.signOut();
            window.location.href = '../index.html';
        }

        (async function() {
            const admin = await initAdmin();
            if (!admin) return;
            const sb = getSupabase();

            const [orders, products, users] = await Promise.all([
                sb.from('orders').select('*', { count: 'exact' }),
                sb.from('products').select('*', { count: 'exact' }).eq('status', 'active'),
                sb.from('profiles').select('*', { count: 'exact' })
            ]);

            document.getElementById('stat-orders').textContent = orders.count || 0;
            const totalRevenue = (orders.data || []).reduce((sum, o) => sum + Number(o.total_price), 0);
            document.getElementById('stat-revenue').textContent = '¥' + totalRevenue.toLocaleString();
            document.getElementById('stat-products').textContent = products.count || 0;
            document.getElementById('stat-users').textContent = users.count || 0;

            const statusMap = { pending: '待确认', processing: '处理中', shipped: '已发货', completed: '已完成', cancelled: '已取消' };
            const recent = (orders.data || []).sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 5);
            if (recent.length === 0) {
                document.getElementById('recent-orders').innerHTML = '<tr><td colspan="6" class="admin-empty">暂无订单</td></tr>';
            } else {
                document.getElementById('recent-orders').innerHTML = recent.map(o => `<tr>
                <td>#${o.id}</td>
                <td>${o.contact_name || '-'}</td>
                <td>${(o.items || []).map(i => i.name).join(', ')}</td>
                <td>¥${Number(o.total_price).toLocaleString()}</td>
                <td><span class="status-badge ${o.status}">${statusMap[o.status] || o.status}</span></td>
                <td>${new Date(o.created_at).toLocaleDateString('zh-CN')}</td>
            </tr>`).join('');
            }
        })();
    </script>
</body>
</html>
